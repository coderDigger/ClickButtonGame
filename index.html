<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clicker Game</title>
<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    margin: 0;
    padding: 0;
}
#header {
    position: fixed;
    top: 0;
    right: 0;
    margin: 10px 20px;
    font-size: 24px;
    cursor: pointer;
    display: none;
}
#gameContainer {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-top: 60px;
    padding: 0 50px;
}
#mainGame {
    text-align: center;
    width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
}
#leaderboard {
    margin-top: 30px;
    text-align: left;
}
li { margin: 3px 0; }
#fundPanel, #upgradePanel {
    padding: 25px;
    background: #222;
    border-radius: 12px;
    width: 250px;
    height: fit-content;
    display: flex;
    flex-direction: column;
    align-items: center;
}
button {
    padding: 14px 24px;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    margin: 8px 0;
    transition: transform 0.2s, background 0.2s;
}
button:hover { transform: scale(1.05); }
input {
    width: 220px;
    padding: 12px;
    margin: 5px 0;
    border-radius: 6px;
    border: none;
    font-size: 14px;
    background-color: #555;
    color: white;
    text-align: center;
}
h3 { margin-bottom: 10px; }
h4 { margin-top: 15px; }
.listBox {
    background: #333;
    padding: 10px;
    width: 100%;
    max-height: 150px;
    overflow-y: auto;
    border-radius: 6px;
    margin-top: 10px;
}
#signInForm { margin-bottom: 20px; width:100%; display:flex; flex-direction: column; align-items:center; }
#adminToggle {
    position: fixed;
    right: 20px;
    bottom: 20px;
    background: #444;
    padding: 10px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    z-index: 1000;
    display: none;
}
#adminPanel {
    position: fixed;
    right: 20px;
    bottom: 60px;
    background: #333;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 0 10px black;
    display: none;
    flex-direction: column;
    align-items: center;
    z-index: 999;
}
</style>
</head>
<body>

<div id="header" title="Logout">⎋</div>

<div id="gameContainer">
    <div id="fundPanel">
        <h3>Fund</h3>
        <input type="text" id="fundUser" placeholder="Username to Fund">
        <input type="number" id="fundAmount" placeholder="Amount">
        <button id="fundBtn">Fund Player</button>
        <h4>Last Funds</h4>
        <div id="lastFunds" class="listBox"></div>
    </div>

    <div id="mainGame">
        <div id="signInForm">
            <h2>Sign In / Sign Up</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button id="registerBtn">Sign Up</button>
            <button id="loginBtn">Sign In</button>
            <p id="result"></p>
        </div>

        <div id="game" style="display:none;">
            <h2>Welcome, <span id="userDisplay"></span>!</h2>
            <button id="scoreBtn">Click Me (+<span id="ppcDisplay">1</span>)</button>
            <p>Your Score: <span id="scoreDisplay">0</span></p>
            <div id="endGameMessage"></div>
            <h2>Leaderboard</h2>
            <ul id="leaderboard"></ul>
        </div>
    </div>

    <div id="upgradePanel">
        <h3>Upgrade</h3>
        <p>Current PPC: <span id="infoPPC">1</span></p>
        <p>Next Upgrade: <span id="nextUpgrade">2 PPC at 10,000 points</span></p>
        <button id="upgradeBtn">Upgrade PPC</button>
        <h4>Last Upgrades</h4>
        <div id="lastUpgrades" class="listBox"></div>
    </div>
</div>

<div id="adminToggle">⚙️</div>
<div id="adminPanel">
    <h4>Admin Panel</h4>
    <button id="delScoresBtn">Delete Leaderboard</button>
    <button id="delNamesBtn">Delete Names</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDNPs86IvxikrbOnQn19HC17pq5_0Fd-Fk",
  authDomain: "clickthebutton-5589c.firebaseapp.com",
  databaseURL: "https://clickthebutton-5589c-default-rtdb.firebaseio.com",
  projectId: "clickthebutton-5589c",
  storageBucket: "clickthebutton-5589c.appspot.com",
  messagingSenderId: "847918314591",
  appId: "1:847918314591:web:d803629ff028d7546e57ea"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const header = document.getElementById("header");
const signInForm = document.getElementById("signInForm");
const usernameInput = document.getElementById("username");
const passwordInput = document.getElementById("password");
const registerBtn = document.getElementById("registerBtn");
const loginBtn = document.getElementById("loginBtn");
const result = document.getElementById("result");
const gameDiv = document.getElementById("game");
const userDisplay = document.getElementById("userDisplay");
const scoreDisplay = document.getElementById("scoreDisplay");
const leaderboard = document.getElementById("leaderboard");
const scoreBtn = document.getElementById("scoreBtn");
const ppcDisplay = document.getElementById("ppcDisplay");
const upgradeBtn = document.getElementById("upgradeBtn");
const fundBtn = document.getElementById("fundBtn");
const fundUserInput = document.getElementById("fundUser");
const fundAmountInput = document.getElementById("fundAmount");
const infoPPC = document.getElementById("infoPPC");
const nextUpgrade = document.getElementById("nextUpgrade");
const endGameMessage = document.getElementById("endGameMessage");
const lastFundsDiv = document.getElementById("lastFunds");
const lastUpgradesDiv = document.getElementById("lastUpgrades");

const adminToggle = document.getElementById("adminToggle");
const adminPanel = document.getElementById("adminPanel");
const delScoresBtn = document.getElementById("delScoresBtn");
const delNamesBtn = document.getElementById("delNamesBtn");

let currentUser = localStorage.getItem("currentUser");
let score = 0;
let pointsPerClick = 1;
let lastMilestone = 0;

const upgradeTiers = [
    {threshold: 10000, ppc: 2},
    {threshold: 50000, ppc: 5},
    {threshold: 100000, ppc: 10},
    {threshold: 500000, ppc: 20},
    {threshold: 1000000, ppc: 50},
    {threshold: 5000000, ppc: 100},
    {threshold: 10000000, ppc: 200},
    {threshold: 50000000, ppc: 500},
    {threshold: 100000000, ppc: 1000},
];

function updateLeaderboard(){
    db.ref("users").once("value", snapshot=>{
        const data = snapshot.val() || {};
        const sorted = Object.entries(data).sort((a,b)=> b[1].score - a[1].score);
        leaderboard.innerHTML = "";
        sorted.forEach(([name, info])=>{
            let li = document.createElement("li");
            li.innerText = `${name}: ${info.score} points`;
            leaderboard.appendChild(li);
        });
    });
}

function updatePPC(){
    for(let i=upgradeTiers.length-1;i>=0;i--){
        if(score>=upgradeTiers[i].threshold){
            pointsPerClick=upgradeTiers[i].ppc;
            lastMilestone=upgradeTiers[i].threshold;
            break;
        }
    }
    ppcDisplay.innerText=pointsPerClick;
    infoPPC.innerText=pointsPerClick;
    updateUpgradeInfo();
}

function updateUpgradeInfo(){
    let nextTier=upgradeTiers.find(t=>t.threshold>score);
    if(nextTier){
        nextUpgrade.innerText=`Next Upgrade: ${nextTier.ppc} PPC at ${nextTier.threshold} points`;
    } else {
        nextUpgrade.innerText=`Next Upgrade: Automatic scaling beyond ${pointsPerClick} PPC`;
    }
}

function startGame(){
    signInForm.style.display="none";
    gameDiv.style.display="block";
    header.style.display="block";
    userDisplay.innerText=currentUser;
    scoreDisplay.innerText=score;
    updateUpgradeInfo();
    updatePPC();
    updateLeaderboard();

    if(currentUser==="Kanaska"){
        adminToggle.style.display="block";
    }
}

// Sign Up
registerBtn.onclick = function() {
    const username = usernameInput.value.trim();
    const password = passwordInput.value.trim();
    if (!username || !password) { result.innerText = "Enter username & password!"; return; }
    db.ref("users/" + username).once("value", snapshot => {
        if (snapshot.exists()) { result.innerText = "User already exists!"; return; }
        db.ref("users/"+username).set({score:0,password:password}, ()=>{
            currentUser = username;
            localStorage.setItem("currentUser", currentUser);
            score=0;
            startGame();
        });
    });
}

// Sign In
loginBtn.onclick = function(){
    const username=usernameInput.value.trim();
    const password=passwordInput.value.trim();
    if(!username||!password){result.innerText="Enter username & password!";return;}
    db.ref("users/"+username).once("value", snapshot=>{
        if(!snapshot.exists()){result.innerText="User not found!";return;}
        if(snapshot.val().password!==password){result.innerText="Wrong password!";return;}
        currentUser=username;
        localStorage.setItem("currentUser",currentUser);
        score=snapshot.val().score||0;
        startGame();
    });
}

// Auto-login if user exists
if(currentUser){
    db.ref("users/"+currentUser).once("value", snapshot=>{
        if(snapshot.exists()){
            score=snapshot.val().score||0;
            startGame();
        } else {
            localStorage.removeItem("currentUser");
        }
    });
}

header.onclick=function(){
    localStorage.removeItem("currentUser");
    location.reload();
}

// Click button
scoreBtn.onclick=function(){
    if(!currentUser)return;
    score+=pointsPerClick;
    scoreDisplay.innerText=score;
    updatePPC();
    db.ref("users/"+currentUser+"/score").set(score, ()=>updateLeaderboard());
    if(score>=1000000000){
        endGameMessage.innerText="End the game??";
        scoreBtn.disabled=true;
        upgradeBtn.disabled=true;
    }
}

// Upgrade button
upgradeBtn.onclick=function(){
    let nextTier=upgradeTiers.find(t=>t.threshold>score);
    if(nextTier&&score>=nextTier.threshold){
        pointsPerClick=nextTier.ppc;
        lastMilestone=nextTier.threshold;
        ppcDisplay.innerText=pointsPerClick;
        infoPPC.innerText=pointsPerClick;
        // Global Last Upgrades
        db.ref("lastUpgrades").push({user: currentUser, ppc: pointsPerClick, timestamp: Date.now()});
    }else{
        alert("Not enough points for next upgrade yet!");
    }
    updateUpgradeInfo();
}

// Fund button
fundBtn.onclick=function(){
    const targetUser=fundUserInput.value.trim();
    const amount=parseInt(fundAmountInput.value);
    if(!targetUser||isNaN(amount)||amount<=0){alert("Enter valid username and amount!");return;}
    if(score<amount){alert("Not enough points!");return;}
    db.ref("users/"+targetUser).once("value", snapshot=>{
        if(!snapshot.exists()){alert("Target user not found!");return;}
        score-=amount;
        scoreDisplay.innerText=score;
        db.ref("users/"+currentUser+"/score").set(score);
        const targetScore=snapshot.val().score||0;
        db.ref("users/"+targetUser+"/score").set(targetScore+amount, ()=>updateLeaderboard());
        // Global Last Funds
        db.ref("lastFunds").push({from: currentUser,to: targetUser,amount:amount,timestamp: Date.now()});
    });
}

// Real-time Last Funds
db.ref("lastFunds").on("value", snapshot => {
    const data = snapshot.val() || {};
    lastFundsDiv.innerHTML = "";
    Object.values(data).reverse().forEach(entry => {
        const div = document.createElement("div");
        div.innerText = `${entry.from} gave ${entry.amount} to ${entry.to}`;
        div.style.color = `hsl(${Math.random()*360},80%,60%)`;
        lastFundsDiv.appendChild(div);
    });
});

// Real-time Last Upgrades
db.ref("lastUpgrades").on("value", snapshot => {
    const data = snapshot.val() || {};
    lastUpgradesDiv.innerHTML = "";
    Object.values(data).reverse().forEach(entry => {
        const div = document.createElement("div");
        div.innerText = `${entry.user} upgraded to ${entry.ppc} PPC`;
        lastUpgradesDiv.appendChild(div);
    });
});

// Admin panel toggle
adminToggle.onclick=function(){
    adminPanel.style.display=(adminPanel.style.display==="none"||adminPanel.style.display=="")?"flex":"none";
}

// Admin buttons
delScoresBtn.onclick=function(){
    if(confirm("Are you sure? This will reset all scores!")){
        db.ref("users").once("value", snapshot =>{
            const users=snapshot.val()||{};
            for(let username in users){
                db.ref("users/"+username+"/score").set(0);
            }
            updateLeaderboard();
        });
    }
}

delNamesBtn.onclick=function(){
    if(confirm("Are you sure? This will delete all users and scores!")){
        db.ref("users").remove(()=>updateLeaderboard());
    }
}

updateLeaderboard();
setInterval(updateLeaderboard,3000);
</script>

</body>
</html>
